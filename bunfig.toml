[install]
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any. The three @lovable.dev entries are the platform's own
# packages: without them, Lovable's publish build fails to install, and the
# published bundle ships WITHOUT the injected Supabase env (login breaks
# with "Missing Supabase environment variable(s)"). Keep this list a
# superset of Lovable's — verbatim syncs overwrite their copy.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config", "@lovable.dev/mcp-js", "@lovable.dev/cloud-auth-js"]
